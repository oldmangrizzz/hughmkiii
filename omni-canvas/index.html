<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Identity -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HUGH" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <title>H.U.G.H. — Sovereign Mind</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }

      @keyframes sleep-pulse {
        0%, 100% {
          background: radial-gradient(ellipse at center, rgba(128, 0, 128, 0.45) 0%, transparent 70%);
        }
        50% {
          background: radial-gradient(ellipse at center, rgba(255, 191, 0, 0.45) 0%, transparent 70%);
        }
      }

      .somatic-sleep-pulse {
        animation: sleep-pulse 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
