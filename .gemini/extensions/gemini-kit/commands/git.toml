```

### Message Format (Conventional Commits)
```
<type>(<scope>): <description>

[optional body]

[optional footer]
```

### Commit Types
| Type | Use Case |
|------|----------|
| `feat` | New feature |
| `fix` | Bug fix |
| `docs` | Documentation only |
| `refactor` | Code restructuring |
| `perf` | Performance improvement |
| `test` | Adding tests |
| `chore` | Maintenance (deps, config) |
| `style` | Formatting (no code change) |

